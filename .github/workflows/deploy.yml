# Build the mdBook (CI gate on every push/PR) and deploy to GitHub Pages on main.
# Based on the official actions/starter-workflows pages/mdbook.yml, extended with the
# mermaid + admonish + linkcheck plugins. The `build` job validates the book on every
# push (broken internal links fail it — see book.toml warning-policy). The `deploy`
# job only runs on the default branch, so it stays dormant while the repo is private.
name: book

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: "0.4.40"
      MDBOOK_MERMAID_VERSION: "0.14.0"
      MDBOOK_ADMONISH_VERSION: "1.18.0"
      MDBOOK_LINKCHECK_VERSION: "0.7.7"
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - name: Install mdBook + plugins (prebuilt binaries)
        run: |
          cargo binstall -y mdbook@${MDBOOK_VERSION} \
            mdbook-mermaid@${MDBOOK_MERMAID_VERSION} \
            mdbook-admonish@${MDBOOK_ADMONISH_VERSION} \
            mdbook-linkcheck@${MDBOOK_LINKCHECK_VERSION}
      - name: Generate plugin assets
        run: |
          mdbook-mermaid install .
          mdbook-admonish install .
      - name: Build (linkcheck runs as a backend during build)
        run: mdbook build
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book/html   # with the linkcheck backend, html output nests under book/html

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
