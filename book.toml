# mdBook configuration.
# Plugins required to build: mdbook, mdbook-mermaid, mdbook-admonish, mdbook-linkcheck.
# First-time setup copies plugin assets into the repo:
#   mdbook-mermaid install .
#   mdbook-admonish install .
# (CI does this automatically — see .github/workflows/deploy.yml)

[book]
title = "The Cross-OS Detection Graph"
# Working title (provisional — see appendix/roadmap.md).
authors = ["imposter (iimp0ster)"]
description = "How one threat looks across Windows, Linux, and macOS telemetry — and where each one is blind. A detection-engineering field guide."
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/iimp0ster/os-internals-de-guide"
edit-url-template = "https://github.com/iimp0ster/os-internals-de-guide/edit/main/{path}"
additional-css = ["./mdbook-admonish.css", "./retro-theme.css"]
additional-js = ["./mermaid.min.js", "./mermaid-init.js", "./visibility-delta-markers.js"]
# Note: theme/ asset files are generated by the `install` steps above; they are
# git-ignored intentionally so the plugin version is the source of truth.

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[preprocessor.admonish]
command = "mdbook-admonish"
# `mdbook-admonish install .` writes/overwrites assets_version to match the installed
# binary, so this value is managed by that step — don't hand-edit it.
assets_version = "3.1.0" # do not edit: managed by `mdbook-admonish install`

# [preprocessor.mermaid] disabled for LOCAL PREVIEW — rendered client-side via mermaid-init.js
# instead (the mdbook-mermaid binary is version-skewed vs this mdbook). Restore: book.toml.preview-bak.

# [output.linkcheck] temporarily disabled for LOCAL PREVIEW (needs the mdbook-linkcheck
# backend + would fail on draft-stage broken links). Original config: book.toml.preview-bak.
